name: Jules TODO Burn Down
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  kickoff_jules:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jules to find and fix next TODO
        run: |
          curl https://jules.googleapis.com/v1alpha/sessions \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d '{
              "prompt": "Read TODO.md and identify the first incomplete item. If the item is a high-level feature, update TODO.md by breaking that item into smaller, actionable sub-tasks.Then, implement the first actionable sub-task found in the updated list. Adhere strictly to the architectural patterns in AGENTS.md.Once the code is written, run the project's test suite to verify the fix. Finally, mark the specific sub-task as 'Done' in TODO.md before submitting the cumulative changes as a single Pull Request.",
              "sourceContext": {
                "source": "sources/github/dkanda/petals",
                "githubRepoContext": { "startingBranch": "main" }
              },
              "automationMode": "AUTO_CREATE_PR",
              "title": "Post-Merge Auto Burn-Down"
            }'
