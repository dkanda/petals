<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petals Server Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .status-card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .status-card h3 {
            margin: 0 0 10px 0;
            color: #555;
            font-size: 1.1em;
        }
        .status-card p {
            margin: 0;
            font-size: 1.2em;
            font-weight: bold;
            color: #222;
        }
        .error {
            color: red;
            text-align: center;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Petals Server Status</h1>
        <div id="error-message" class="error"></div>
        <div class="status-grid">
            <div class="status-card">
                <h3>Model</h3>
                <p id="model-name">Loading...</p>
            </div>
            <div class="status-card">
                <h3>Device</h3>
                <p id="device-name">Loading...</p>
            </div>
            <div class="status-card">
                <h3>Connection Status</h3>
                <p id="connection-status">Loading...</p>
            </div>
            <div class="status-card">
                <h3>Block Health</h3>
                <p id="block-health">Loading...</p>
            </div>
            <div class="status-card">
                <h3>Inference Throughput</h3>
                <p id="throughput">Loading...</p>
            </div>
            <div class="status-card">
                <h3>GPU Usage</h3>
                <p id="gpu-usage">Loading...</p>
            </div>
        </div>
        <div class="footer">
            <p>Last updated: <span id="last-updated">Never</span></p>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/v1/status');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                document.getElementById('model-name').textContent = data.model || 'Unknown';
                document.getElementById('device-name').textContent = data.device || 'Unknown';
                document.getElementById('connection-status').textContent = data.connection_status || 'Unknown';
                document.getElementById('block-health').textContent = data.block_health || 'Unknown';
                document.getElementById('throughput').textContent = data.throughput !== undefined ? `${data.throughput.toFixed(2)} tokens/s` : 'Unknown';
                document.getElementById('gpu-usage').textContent = data.gpu_usage || 'Unknown';

                document.getElementById('error-message').textContent = '';
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('error-message').textContent = 'Failed to fetch status: ' + error.message;
            }
        }

        // Fetch immediately and then every 5 seconds
        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
